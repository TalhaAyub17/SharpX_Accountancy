<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We'll Be Right Back</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 16px;
            color: #1a1a1a;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 24px;
        }
        .countdown {
            display: inline-block;
            background: #eef2f7;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            color: #0066cc;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🛠️</div>
        <h1>Under Maintenance</h1>
        <p>We are currently updating our website to bring you a better experience. Thank you for your patience!</p>
        <div class="countdown">
            Back online in approx. <span id="hours-left">2</span> hours
        </div>
    </div>

</body>
</html>
